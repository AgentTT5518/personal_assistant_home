name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if Node project exists
        id: node_check
        run: |
          if [ -f "package.json" ]; then
            echo "has_node=true" >> $GITHUB_OUTPUT
          else
            echo "has_node=false" >> $GITHUB_OUTPUT
            echo "No package.json found — skipping deploy (template repo)"
          fi

      - name: Setup Node.js
        if: steps.node_check.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'   # uncomment and set to pnpm/bun/npm once lock file exists

      - name: Install dependencies
        if: steps.node_check.outputs.has_node == 'true'
        run: npm install   # replace with your package manager (pnpm/bun/yarn)

      - name: Build
        if: steps.node_check.outputs.has_node == 'true'
        run: npm run build

      # --- Deploy to Vercel ---
      # Add deploy secrets in GitHub: Settings → Secrets and variables → Actions
      # Required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      # Replace this step with your own deploy target if not using Vercel.
      - name: Deploy to Vercel
        if: steps.node_check.outputs.has_node == 'true'
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
